name: test-go

permissions: {}

on:
  push:
    branches:
      - main
      - renovate/**
    paths:
      - go/**
      - testdata/**
      - .github/**
  pull_request:
    branches:
      - main
    paths:
      - go/**
      - testdata/**
      - .github/**

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
        go: ['1.18.x']
        include:
          - os: windows-latest
            go: '1.18.x'
          - os: macos-latest
            go: '1.18.x'

    steps:
    - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      with:
        persist-credentials: false
    - name: Set up Go
      uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
      with:
        go-version: ${{ matrix.go }}
        cache-dependency-path: go/go.sum
    - name: lint
      working-directory: go
      run: gofmt -w .
    - name: test
      working-directory: go
      run: go test ./...

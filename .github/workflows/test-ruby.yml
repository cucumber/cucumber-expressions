name: test-ruby

permissions: {}

on:
  push:
    branches:
      - main
      - renovate/**
    paths:
      - ruby/**
      - testdata/**
      - .github/**
  pull_request:
    branches:
      - main
    paths:
      - ruby/**
      - testdata/**
      - .github/**

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
        ruby: ['3.0', '3.1', '3.2', '3.3', '3.4', '3.5']
        include:
          - os: windows-latest
            ruby: '3.4'
          - os: macos-latest
            ruby: '3.4'

    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        persist-credentials: false
    - uses: ruby/setup-ruby@0dafeac902942906541bc140009cdbf32665b601 # v1.315.0
      with:
        ruby-version: ${{ matrix.ruby }}
        bundler-cache: true
        working-directory: ruby
    - name: rspec
      working-directory: ruby
      run: bundle exec rspec
